<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Doodle MMO — Super Light Sprite!</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Nunito:wght@700;900&display=swap');

        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
        body,html{width:100%;height:100%;overflow:hidden;touch-action:none;background:#475569;font-family:'Patrick Hand',cursive;color:#1e293b;display:flex;justify-content:center;align-items:center;}

        /* ── DESKTOP & MOBILE WRAPPER ── */
        #gameContainer {
            position:relative; width:100%; height:100%; max-width:460px;
            background: linear-gradient(180deg, #e0e7ff 0%, #f8fafc 100%);
            overflow:hidden; box-shadow:0 0 40px rgba(0,0,0,0.6);
            transition: background 0.5s ease;
        }
        @media (min-width: 480px) { #gameContainer { height:95vh; border-radius:24px; border:8px solid #0f172a; } }

        @keyframes shake {
            0%,100% { transform: translate(0px, 0px); }
            25% { transform: translate(-3px, 1px); }
            50% { transform: translate(2px, -2px); }
            75% { transform: translate(-2px, 2px); }
        }
        .shake-effect { animation: shake 0.25s cubic-bezier(.36,.07,.19,.97) both; }

        .bg-grid{position:absolute;inset:0;z-index:0;pointer-events:none;
            background-image:linear-gradient(rgba(255,255,255,0.1) 1.5px,transparent 1.5px),linear-gradient(90deg,rgba(255,255,255,0.1) 1.5px,transparent 1.5px);
            background-size:45px 45px;}

        canvas{position:absolute;inset:0;width:100%;height:100%;z-index:1; image-rendering: pixelated;}

        /* ── UI ULTRA LIGHT ── */
        #hudLayer{position:absolute;inset:0;z-index:10;pointer-events:none;padding:12px;}
        .hud-header{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;width:100%;}
        .hud-left, .hud-right {width:50%; display:flex; flex-direction:column; gap:6px;}

        .hud-card{background:rgba(255,255,255,0.92);backdrop-filter:blur(8px);
            border:2.5px solid #1e293b;border-radius:14px;
            box-shadow:3px 3px 0 #1e293b22;padding:8px 10px; pointer-events:auto;}
        
        .dot-pulse{width:8px;height:8px;border-radius:50%;background:#22c55e;animation:pulse 1.5s infinite; flex-shrink:0;}
        @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(1.4)}}

        #powerBar{width:100%;height:8px;border:2.5px solid #1e293b;border-radius:999px;background:#f1f5f9;overflow:hidden;display:none;}
        #powerFill{height:100%;width:100%;transition:width .1s;}

        .lb-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1.5px dashed #cbd5e1;}
        .lb-row:last-child{border-bottom:none;}
        .lb-rank{width:22px;text-align:center;font-weight:900;}
        .lb-name{flex:1;padding:0 8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:0.85rem;font-weight:700;}
        .lb-score{color:#3b82f6;font-weight:900;font-size:0.85rem;}

        .flex-center { display:flex; align-items:center; gap:6px; }

        /* ── DROPDOWNS ── */
        #liveTopBtn{cursor:pointer;font-size:0.8rem;color:#b45309;background:#fef3c7;padding:4px 8px;border-radius:10px;font-weight:800;border:2px solid #fbbf24;display:flex;justify-content:space-between;align-items:center;}
        #liveTopBtn:active{background:#fde68a;}
        #liveTopContent, #lbContent{display:none;margin-top:6px;padding-top:4px;border-top:2px dashed #cbd5e1;}
        #liveTopContent.open, #lbContent.open{display:block;}

        /* ── MODAL MENU ── */
        #overlay{position:absolute;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;
            background:rgba(15,23,42,.8);backdrop-filter:blur(5px);}
        .modal{background:white;border:4px solid #1e293b;border-radius:20px;
            box-shadow:6px 6px 0 #1e293b;padding:20px;width:90%;max-width:320px;text-align:center;
            animation:popIn .3s cubic-bezier(.34,1.56,.64,1);}
        @keyframes popIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
        .modal h1{font-size:2.2rem;font-family:'Nunito',sans-serif;font-weight:900;line-height:1;color:#1e293b;}
        .modal h1 span{color:#3b82f6;}
        
        .doodle-input{width:100%;padding:10px 14px;border:3px solid #cbd5e1;border-radius:12px;
            font-family:'Patrick Hand',cursive;font-size:1.1rem;text-align:center;outline:none;background:#f8fafc; margin-top:15px;}
        .doodle-input:focus{border-color:#3b82f6;background:#fff;}

        .cat-title {font-size:.8rem;color:#475569;font-weight:900;text-transform:uppercase;margin:12px 0 6px;}
        .color-row{display:flex;justify-content:center;gap:8px;}
        .color-dot{width:45px;height:45px;border-radius:50%;border:3px solid transparent;cursor:pointer; position:relative; overflow:hidden;}
        .color-dot.selected{border-color:#1e293b;transform:scale(1.1);box-shadow:0 3px 8px rgba(0,0,0,0.2);}
        .color-dot img { width: 140%; height: 140%; object-fit: cover; object-position: center top; margin: -20%; }

        .btn-primary{display:flex;align-items:center;justify-content:center;gap:8px;
            width:100%;padding:12px;border:3px solid #1e40af;border-radius:12px;
            background:#3b82f6;color:white;
            font-family:'Nunito',sans-serif;font-size:1.1rem;font-weight:900;cursor:pointer;
            box-shadow:0 4px 0 #1e40af; margin-top:16px; text-transform:uppercase;}
        .btn-primary:active{transform:translateY(4px);box-shadow:0 0px 0 #1e40af;}
        #errMsg{color:#ef4444;font-size:.85rem;font-weight:700;min-height:20px;margin:4px 0;}

        /* ── CHAT ── */
        #chatFab{position:absolute;bottom:20px;right:15px;z-index:30;pointer-events:auto; display:none;}
        #chatFabBtn{width:50px;height:50px;border-radius:50%;border:3px solid #1e293b;font-size:1.5rem;
            background:white;box-shadow:3px 3px 0 #1e293b30;cursor:pointer;
            display:flex;align-items:center;justify-content:center;}
        #chatFabBtn:active{transform:scale(.95);}
        #chatPopup{position:absolute;bottom:60px;right:0;width:240px;
            background:rgba(255,255,255,.98);border:3px solid #1e293b;border-radius:16px;box-shadow:4px 4px 0 #1e293b22;
            padding:10px;display:none;flex-direction:column;gap:8px;}
        #chatPopup.open{display:flex;}
        .qc-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
        .qc-btn{background:#f1f5f9;border:2px solid #cbd5e1;border-radius:8px;padding:6px;font-family:'Patrick Hand',cursive;font-size:.85rem;font-weight:700;}
        #chatInputRow{display:flex;gap:6px;}
        #chatTxt{flex:1;padding:6px 10px;border:2.5px solid #cbd5e1;border-radius:999px;font-family:'Patrick Hand',cursive;font-size:.9rem;outline:none;}
        #chatSend{width:34px;height:34px;border-radius:50%;background:#3b82f6;border:none;color:white;cursor:pointer; font-weight:bold;}

        /* ── TOUCH ZONES ── */
        #touchZone{position:absolute;bottom:0;left:0;width:100%;height:100%;z-index:5;display:none;}
        .tz{position:absolute;bottom:0;height:65%;}
        #tzL{left:0;width:50%;} #tzR{right:0;width:50%;} #tzJ{top:0;left:0;width:100%;height:35%;}

        .float-txt{position:absolute;pointer-events:none;z-index:40;
            font-family:'Nunito',sans-serif;font-weight:900;font-size:1.2rem;
            text-shadow:0 2px 0 #000, 0 -2px 0 #000, 2px 0 0 #000, -2px 0 0 #000;
            animation:floatUp 1.2s ease-out forwards;text-align:center;width:200px;margin-left:-100px;}
        @keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-80px) scale(1.2)}}
    </style>
</head>
<body>

<div id="gameContainer">
    <div class="bg-grid"></div>
    <canvas id="gc"></canvas>

    <!-- HUD (Optimized with Emojis instead of SVGs) -->
    <div id="hudLayer">
        <div class="hud-header">
            <div class="hud-left">
                <div id="scoreHud" class="hud-card" style="display:none; flex-direction:column; gap:6px;">
                    <div class="flex-center" style="justify-content:space-between;">
                        <div class="flex-center">
                            <span style="font-size:1.3rem;">🏃</span>
                            <span id="scoreVal" style="font-size:1.5rem; color:#2563eb; font-weight:900; font-family:'Nunito',sans-serif;">0m</span>
                        </div>
                        <span style="font-size:0.7rem; color:#64748b; font-weight:700;">High: <span id="highScoreVal">0m</span></span>
                    </div>
                    
                    <div id="liveTopBtn">
                        <div class="flex-center">
                            <span>👑</span>
                            <span style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:65px;" id="liveTopName">-</span> 
                            <span>(<span id="liveTopScore">0m</span>)</span>
                        </div>
                        <span id="liveTopArrow" style="font-size:0.7rem;">▼</span>
                    </div>

                    <div id="heartContainer" style="display:none; align-items:center; gap:6px; margin-top:2px; padding-top:4px; border-top:1.5px dashed #cbd5e1;">
                        <span>❤️</span>
                        <span style="font-size:0.75rem; font-weight:900; color:#ef4444;">1X PENYELAMAT</span>
                    </div>
                    <div id="liveTopContent"><div id="liveTopListRows"></div></div>
                </div>
                <div id="powerBar"><div id="powerFill"></div></div>
            </div>

            <div class="hud-right">
                <div id="lbPanel" class="hud-card" style="display:none; flex-direction:column; gap:6px;">
                    <div id="lbToggle" class="flex-center" style="justify-content:space-between; cursor:pointer;">
                        <div class="flex-center" style="font-size:0.75rem; color:#475569; font-weight:800;">
                            <span>🏆</span> LEADERBOARD
                        </div>
                        <span id="lbArrow" style="font-size:0.7rem; color:#94a3b8;">▼</span>
                    </div>
                    <div style="font-size:0.85rem; display:flex; justify-content:space-between;">
                        <span id="lbTop1Name" style="font-weight:900; color:#2563eb; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:80px;">Lokal</span>
                        <span id="lbTop1Score" style="color:#d97706; font-weight:900; font-family:'Nunito',sans-serif;">-</span>
                    </div>
                    <div id="lbContent">
                        <div id="lbRows"></div>
                        <div style="font-size:.65rem;color:#94a3b8;margin-top:8px;text-align:center;font-weight:700;">Hanya tersimpan di HP ini</div>
                    </div>
                </div>
                
                <div class="hud-card flex-center" style="display:none; padding:6px 10px; justify-content:center; gap:6px;" id="onlinePill">
                    <div class="dot-pulse"></div>
                    <span style="font-size:0.8rem; color:#475569; font-weight:700;">Online: <strong id="onlineCnt" style="color:#0f172a; font-size:.9rem;">1</strong></span>
                </div>
            </div>
        </div>
    </div>

    <!-- Start Menu -->
    <div id="overlay">
        <div class="modal">
            <h1>DOODLE <span>MMO</span></h1>
            
            <input type="text" class="doodle-input" id="nameInput" placeholder="Ketik Namamu..." maxlength="10">
            <div id="errMsg"></div>

            <p class="cat-title">Pilih Karakter</p>
            <div class="color-row" id="charRow">
                <div class="color-dot selected char-sel" data-t="doodle" style="background:#e2e8f0;"><img src="./assets/spr_char_doodle.png" onerror="this.style.display='none'"></div>
                <div class="color-dot char-sel" data-t="jelly" style="background:#fbcfe8;"><img src="./assets/spr_char_jelly.png" onerror="this.style.display='none'"></div>
                <div class="color-dot char-sel" data-t="slime" style="background:#bbf7d0;"><img src="./assets/spr_char_slime.png" onerror="this.style.display='none'"></div>
                <div class="color-dot char-sel" data-t="ninja" style="background:#cbd5e1;"><img src="./assets/spr_char_ninja.png" onerror="this.style.display='none'"></div>
                <div class="color-dot char-sel" data-t="robot" style="background:#94a3b8;"><img src="./assets/spr_char_robot.png" onerror="this.style.display='none'"></div>
            </div>

            <div id="assetsStatus" style="font-size: 0.7rem; color: #b45309; margin-top: 8px; display: none;">
                ⚠️ Harus dibuka lewat Live Server/Hosting!
            </div>

            <button class="btn-primary" id="startBtn">▶ MULAI LOMPAT!</button>
        </div>
    </div>

    <!-- Chat -->
    <div id="chatFab">
        <div id="chatPopup">
            <div class="qc-grid" id="qcGrid">
                <button class="qc-btn">Halo semua!</button>
                <button class="qc-btn">Ayo naik!</button>
                <button class="qc-btn">Sabar :)</button>
                <button class="qc-btn">AAAAAA!</button>
            </div>
            <div id="chatInputRow">
                <input type="text" id="chatTxt" placeholder="Ketik pesan..." maxlength="25">
                <button id="chatSend">➤</button>
            </div>
        </div>
        <button id="chatFabBtn">💬</button>
    </div>

    <!-- Touch Zones -->
    <div id="touchZone"><div id="tzJ"></div><div class="tz" id="tzL"></div><div class="tz" id="tzR"></div></div>
</div>

<script>
// ── ASSETS LOADER ──
const ASSETS_PATH = './assets/';
const sprites = {
    char_doodle: new Image(), char_jelly: new Image(), char_slime: new Image(), char_ninja: new Image(), char_robot: new Image(),
    item_hat: new Image(), item_star: new Image(), item_rocket: new Image(), item_dj: new Image(), item_heart: new Image(), item_balloon: new Image(),
    plat_normal: new Image(), plat_moving: new Image(), plat_conveyor: new Image(), plat_icy: new Image(), plat_ghost: new Image(),
    plat_updown: new Image(), plat_fragile: new Image(), plat_spring: new Image(), plat_trampoline: new Image(), plat_portal: new Image(), plat_bumper: new Image()
};

for (let key in sprites) {
    sprites[key].src = `${ASSETS_PATH}spr_${key}.png`;
    sprites[key].onerror = () => { document.getElementById('assetsStatus').style.display = 'block'; };
}

// ── CONFIG (Upstash dimatikan, Server Ably diubah jalurnya) ──
const ABLY_KEY = '4opURQ.FVPiqg:z5W8zQxWoBNlXmlAXvOv4Bz1bmn_ISnFucJGpjFijS8';
const ABLY_CHANNEL = 'doodle-mmo-sprites-v1'; // Channel baru khusus versi sprite
const LB_KEY = 'doodle_local_lb'; // Local Leaderboard

const MAP_W = 420; const GROUND_Y = 0;     

// ── CANVAS & RESIZE ──
const container = document.getElementById('gameContainer'), canvas = document.getElementById('gc'), ctx = canvas.getContext('2d');
let W = 0, H = 0, mapOffsetX = 0;
function resize() {
    const dpr = window.devicePixelRatio || 1;
    W = container.clientWidth; H = container.clientHeight;
    canvas.width = W * dpr; canvas.height = H * dpr;
    ctx.scale(dpr, dpr); mapOffsetX = (W - MAP_W) / 2;
}
window.addEventListener('resize', resize); resize();

// ── STATE ──
let gameState = 'MENU'; 
let myId = 'dm_' + Math.random().toString(36).substr(2,8);
let playerName = 'Doodler', playerType = 'doodle'; 

let p = {
    x: 0, y: 0, vx: 0, vy: 0, oldY: 0, scaleX: 1, scaleY: 1, facing: 'right',
    flyTimer: 0, rocketTimer: 0, djTimer: 0, balloonTimer: 0, hurtTimer: 0,
    hasDJ: false, hasHeart: false, starCharges: 0, isFreeFalling: false,
    chatMsg: '', chatTimer: 0, idleBreath: 0, isIdle: false,
    currentPlatform: null, platOffsetX: 0, expressionTimer: 0, collectedLoot: new Map() 
};

let peers = {}, platforms = new Map(), stars = new Map(), items = new Map(), particles = [];
let camY = 0, currentMeters = 0, displayScore = 0;
let highScore = parseInt(localStorage.getItem('doodle_hs_local') || '0'); 
document.getElementById('highScoreVal').textContent = highScore + 'm';

// FISIKA
const GRAVITY = 0.55, JUMP_FORCE = -14, SPRING_FORCE = -20, TRAMPOLINE_FORCE = -25, FLY_FORCE = -20, ROCKET_FORCE = -30, BUMPER_FORCE = -17, BOOST_FORCE = -30;
let TERMINAL_V = 18; const MOVE_SPEED = 9; const PLAT_GAP = 145; 
let keys = { left: false, right: false };

// ── LOCAL LEADERBOARD SAJA ──
let leaderboard = [];
function lbLocalLoad() { try { let d = localStorage.getItem(LB_KEY); if (d) leaderboard = JSON.parse(d); } catch(e) {} }
function lbLocalSave() { try { localStorage.setItem(LB_KEY, JSON.stringify(leaderboard)); } catch(e) {} }

function lbSubmit(name, sc) {
    lbLocalLoad();
    let idx = leaderboard.findIndex(e => e.name === name);
    if (idx >= 0) { if (sc > leaderboard[idx].score) leaderboard[idx].score = sc; } 
    else { leaderboard.push({ name, score: sc }); }
    leaderboard.sort((a,b) => b.score - a.score); if (leaderboard.length > 10) leaderboard = leaderboard.slice(0, 10);
    lbLocalSave(); renderLB();
}

function renderLB() {
    const rows = document.getElementById('lbRows');
    rows.innerHTML = leaderboard.slice(0,10).map((e,i)=>`
        <div class="lb-row">
            <span class="lb-rank" style="color:${i===0?'#eab308':i===1?'#94a3b8':i===2?'#d97706':'#cbd5e1'}">${i+1}</span>
            <span class="lb-name">${escHtml(e.name)}</span>
            <span class="lb-score">${e.score}m</span>
        </div>`).join('');
    if (leaderboard.length > 0) { document.getElementById('lbTop1Name').textContent = leaderboard[0].name; document.getElementById('lbTop1Score').textContent = leaderboard[0].score + 'm'; }
}
function escHtml(s) { return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// ── ABLY MULTIPLAYER ──
let ably, chan;
function connectAbly(name) {
    if (ably) { try { ably.close(); } catch(e){} }
    try {
        ably = new Ably.Realtime({ key: ABLY_KEY, clientId: myId }); 
        chan = ably.channels.get(ABLY_CHANNEL); 
        chan.presence.subscribe(() => { chan.presence.get((err, m) => { if(m) document.getElementById('onlineCnt').textContent = m.length; }); });
        
        chan.subscribe('sync', msg => {
            if (msg.clientId === myId) return; 
            let d = msg.data, id = msg.clientId, now = Date.now();
            if (!peers[id]) peers[id] = { buffer: [], chatTimer: 0, chatMsg: '', lastSeen: now, x: d.x, y: d.y };
            peers[id].buffer.push({ t: now, x: d.x, y: d.y, vx: d.vx, vy: d.vy, idl: d.idl, ct: d.ct||'doodle', n: d.n, sx: d.sx, sy: d.sy, f: d.f, fly: d.fly, rocket: d.rocket, dj: d.dj, bl: d.bl, s: d.s, fl: d.fl, ht: d.ht });
            if (peers[id].buffer.length > 8) peers[id].buffer.shift(); peers[id].lastSeen = now;
        });
        chan.subscribe('chat', msg => {
            if (msg.clientId === myId) { p.chatMsg = msg.data.t; p.chatTimer = 160; }
            else if (peers[msg.clientId]) { peers[msg.clientId].chatMsg = msg.data.t; peers[msg.clientId].chatTimer = 160; }
        });
        chan.presence.enter({ name });
    } catch(e) {}
}

function publishSync() {
    if (!chan || gameState === 'MENU') return;
    chan.publish('sync', { x: p.x, y: p.y, vx: parseFloat(p.vx.toFixed(2)), vy: parseFloat(p.vy.toFixed(2)), idl: p.isIdle, ct: playerType, n: playerName, sx: parseFloat(p.scaleX.toFixed(2)), sy: parseFloat(p.scaleY.toFixed(2)), f: p.facing, fly: p.flyTimer>0, rocket: p.rocketTimer>0, dj: p.djTimer>0, bl: p.balloonTimer>0, s: currentMeters, fl: p.isFreeFalling || p.vy > 8, ht: p.hurtTimer>0 });
}
function sendChat(t) { if (!t) return; if (chan) chan.publish('chat', { t }); else { p.chatMsg = t; p.chatTimer = 160; } }

setInterval(() => { publishSync(); let now = Date.now(); for (let id in peers) if (now - peers[id].lastSeen > 4000) delete peers[id]; }, 40); 

// ── MAP GEN & PLATFORMS (WITH DYNAMIC WIDTH) ──
function mulberry32(seed) { return function() { let t = seed += 0x6D2B79F5; t = Math.imul(t ^ t >>> 15, t | 1); t ^= t + Math.imul(t ^ t >>> 7, t | 61); return ((t ^ t >>> 14) >>> 0) / 4294967296; }; }

function getLevelData(lvl) {
    let rng = mulberry32(lvl * 7919 + 13337);
    let r1 = rng(), r2 = rng(), r3 = rng(), r4 = rng();
    
    // KEMBALIKAN LEBAR DINAMIS (50px sampai 120px)
    let pw = 50 + Math.floor(r1 * 70); 
    let safeWidth = MAP_W - pw - 20;
    let px = 10 + Math.floor(r2 * safeWidth); 
    
    let type = 'normal';
    if (lvl < 10) { if (r3 > 0.8) type = 'moving'; } 
    else if (lvl < 40) { if (r3 > 0.8) type = 'conveyor'; else if (r3 > 0.6) type = 'moving'; else if (r3 > 0.5) type = 'fragile'; else if (r3 > 0.93) type = 'spring'; } 
    else { if (r3 > 0.95) type = 'updown'; else if (r3 > 0.85) type = 'ghost'; else if (r3 > 0.75) type = 'icy'; else if (r3 > 0.6) type = 'conveyor'; else if (r3 > 0.45) type = 'moving'; else if (r3 > 0.4) type = 'fragile'; else if (r3 > 0.35) type = 'trampoline'; else if (r3 > 0.3) type = 'portal'; else if (r3 > 0.25) type = 'bumper'; }

    return { type, pw, px, rng, r4 };
}

function generateLevel(lvl) {
    if (lvl === 0) return { type:'ground', x: -1500, y: GROUND_Y, w: 4000 }; 
    for(let i=1; i<=2; i++) { if (lvl - i > 0 && getLevelData(lvl - i).type === 'updown') return null; }

    let d = getLevelData(lvl); let type = d.type;
    if (lvl > 1 && ['fragile', 'ghost', 'portal'].includes(getLevelData(lvl - 1).type) && ['fragile', 'ghost', 'portal'].includes(type)) type = d.rng() > 0.5 ? 'normal' : 'moving';

    let item = null, hasStar = false, r_item = d.rng();
    if (type !== 'updown') {
        if (['normal', 'moving', 'icy', 'conveyor'].includes(type) && lvl > 5 && r_item > 0.92) {
            let r_which = d.rng();
            item = r_which > 0.8 ? 'rocket' : r_which > 0.6 ? 'hat' : r_which > 0.4 ? 'dj' : r_which > 0.2 ? 'heart' : 'balloon';
        } else if (r_item < 0.05) hasStar = true; 
    }
    return { type, x: d.px, y: GROUND_Y - lvl * PLAT_GAP, w: d.pw, item, hasStar, speed: 1.5 + d.rng() * 1.5, dir: d.rng() > 0.5 ? 1 : -1 };
}

// ── 3-SLICE PLATFORM RENDERING ENGINE ──
class Platform {
    constructor(lvl, data) {
        this.lvl = lvl; Object.assign(this, data);
        this.broken = false; this.fallVy = 0; this.restoreTimer = 0; this.bounceAnim = 0; this.startY = data.y;
        this.isSolid = true; this.tilt = 0; this.isCracking = false; this.crackTimer = 0;
    }
    getX() { return this.type === 'moving' ? 10 + (Math.sin((Date.now() + this.lvl * 1000) / (1500 / this.speed)) * 0.5 + 0.5) * (MAP_W - this.w - 20) : this.x; }
    update() {
        if (this.bounceAnim > 0) this.bounceAnim--;
        if (this.type === 'moving') this.x = this.getX();
        if (this.type === 'fragile') {
            if (this.isCracking && !this.broken) {
                if (--this.crackTimer <= 0) { this.broken = true; this.fallVy = 0; this.restoreTimer = 150; spawnParticles(this.x + this.w/2, this.y, '#f59e0b', 15); }
            }
            if (this.broken && --this.restoreTimer <= 0) { this.broken = false; this.isCracking = false; this.y = this.startY; this.fallVy = 0; spawnParticles(this.x + this.w/2, this.y, '#fff', 8); }
            else if (this.broken) { this.fallVy += GRAVITY; this.y += this.fallVy; }
        }
        if (this.type === 'updown') this.y = this.startY - (Math.sin((Date.now() + this.lvl * 500) / 600) * 0.5 + 0.5) * (PLAT_GAP * 1.8);
    }
    draw() {
        if (this.type === 'ground') { ctx.fillStyle = '#22c55e'; ctx.fillRect(this.x, this.y, this.w, H); ctx.fillStyle = '#166534'; ctx.fillRect(this.x, this.y, this.w, 15); return; }

        let img = sprites['plat_' + this.type] || sprites.plat_normal;
        let frameIndex = 0, h = 80;

        if (this.type === 'conveyor') frameIndex = (this.dir < 0 ? 3 - (Math.floor(Date.now() / 150) % 4) : Math.floor(Date.now() / 150) % 4);
        else if (this.type === 'ghost' || this.type === 'portal') { frameIndex = Math.floor((Date.now() + this.lvl * 300) / 150) % 4; if(this.type==='ghost') this.isSolid = frameIndex !== 2; }
        else if (this.type === 'fragile') frameIndex = this.broken ? 2 : (this.isCracking ? 1 : 0);
        else if (['spring', 'trampoline', 'bumper'].includes(this.type)) frameIndex = this.bounceAnim > 0 ? (this.bounceAnim > 7 ? (this.type==='bumper'?1:2) : (this.type==='bumper'?2:1)) : 0;

        let sx = frameIndex * 160;

        ctx.save();
        if (this.type === 'icy' && this.tilt !== 0) { ctx.translate(this.x + this.w/2, this.y); ctx.rotate(this.tilt); ctx.translate(-(this.x + this.w/2), -this.y); }
        
        let py = this.y - 40 + ((this.type === 'fragile' && this.isCracking && !this.broken) ? (Math.random()-0.5)*4 : 0);
        let px = this.x + ((this.type === 'fragile' && this.isCracking && !this.broken) ? (Math.random()-0.5)*4 : 0);

        if (img.complete && img.naturalHeight > 0) {
            // TEKNIK 3-SLICE SCALING (Kiri, Tengah Tarik, Kanan)
            let edge = 25; // Potong 25px dari kiri dan kanan file sprite
            
            // 1. Gambar Ujung Kiri
            ctx.drawImage(img, sx, 0, edge, h, px, py, edge, h);
            // 2. Gambar Tengah (Ditarik menyesuaikan lebar dynamic `pw` game)
            if (this.w > edge * 2) {
                ctx.drawImage(img, sx + edge, 0, 160 - (edge*2), h, px + edge, py, this.w - (edge*2), h);
            }
            // 3. Gambar Ujung Kanan
            ctx.drawImage(img, sx + 160 - edge, 0, edge, h, px + this.w - edge, py, edge, h);
        }
        ctx.restore();
    }
}

class SpriteItem {
    constructor(id, x, y, type) { this.id = id; this.x = x; this.y = y-32; this.type = type; this.t = 0; }
    update() { this.t += 0.08; }
    draw() {
        let img = sprites['item_' + this.type];
        if (img && img.complete && img.naturalWidth > 0) ctx.drawImage(img, (Math.floor(Date.now() / 120) % 4) * 80, 0, 80, 80, this.x - 40, this.y - 40 + Math.sin(this.t)*6, 80, 80);
    }
}

function spawnParticles(x, y, color, amt) { for(let i=0;i<amt;i++) particles.push({ x, y, vx:(Math.random()-.5)*12, vy:(Math.random()-.5)*12, life:1, c:color, s:Math.random()*5+2, type: Math.random()>.5?'circle':'line' }); }
function floatText(x, y, text, color='#fbbf24') { const el = document.createElement('div'); el.className = 'float-txt'; el.textContent = text; el.style.color = color; el.style.left = (x + mapOffsetX) + 'px'; el.style.top = (y - camY - 30) + 'px'; document.getElementById('gameContainer').appendChild(el); setTimeout(() => el.remove(), 1200); }

function buildMap() { 
    platforms.clear(); stars.clear(); items.clear(); 
    for (let i=Math.max(0, Math.floor((GROUND_Y - (camY+H)) / PLAT_GAP) - 5); i <= Math.floor((GROUND_Y - camY + H) / PLAT_GAP) + 20; i++) initLevel(i);
}

function initLevel(lvl) {
    if (!platforms.has(lvl)) {
        let l = generateLevel(lvl); 
        if (l) {
            platforms.set(lvl, new Platform(lvl, l)); 
            if (l.hasStar) stars.set(lvl, new SpriteItem('st_'+lvl, l.x + l.w/2, l.y, 'star')); 
            if (l.item) items.set(lvl, new SpriteItem('it_'+lvl, l.x + l.w/2, l.y, l.item));
        }
    }
}

function resetGame() {
    p.vy = JUMP_FORCE; p.vx = 0; p.flyTimer=0; p.rocketTimer=0; p.djTimer=0; p.balloonTimer=0; p.hurtTimer=0; p.hasDJ=false; p.hasHeart=false; p.scaleX=1; p.scaleY=1; p.isIdle=false; p.currentPlatform=null; p.facing='right'; p.platOffsetX = 0; p.isFreeFalling = false; p.collectedLoot.clear(); p.expressionTimer=0; particles=[];
    p.x = MAP_W/2; p.y = GROUND_Y - 80; camY = GROUND_Y - H + 20; currentMeters = 0; displayScore = 0; p.starCharges = 0; 
    buildMap(); document.getElementById('scoreVal').textContent = '0m'; document.getElementById('powerBar').style.display = 'none'; gameState = 'PLAY';
}

function drawCharacter(cx, cy, scX, scY, name, facing, flyT, rocketT, djT, blT, chatMsg, chatTimer, isFalling, charType, isHurt, vy) {
    let img = sprites['char_' + charType] || sprites.char_doodle; if (!img.complete || img.naturalWidth === 0) return; 

    ctx.save();
    ctx.translate(cx, cy - 45); ctx.font = `900 14px 'Nunito',sans-serif`; ctx.textAlign='center'; ctx.strokeStyle='white'; ctx.lineWidth=3.5; ctx.strokeText(name, 0, 0); ctx.fillStyle='#1e293b'; ctx.fillText(name, 0, 0);
    
    if (chatTimer > 0 && chatMsg) {
        ctx.font = "700 13px 'Patrick Hand',cursive"; let tw = Math.max(50, ctx.measureText(chatMsg).width + 20);
        ctx.translate(0, -32); ctx.fillStyle='rgba(255,255,255,.96)'; ctx.strokeStyle='#cbd5e1'; ctx.lineWidth=2;
        ctx.beginPath(); ctx.roundRect(-tw/2,-28,tw,28,12); ctx.fill(); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(-6,0); ctx.lineTo(6,0); ctx.lineTo(0,7); ctx.fill();
        ctx.fillStyle='#0f172a'; ctx.textBaseline='middle'; ctx.fillText(chatMsg, 0, -14);
    }
    ctx.restore();

    let frameIndex = isHurt ? 3 : isFalling ? 2 : (vy < -8 || rocketT > 0 || flyT > 0 || djT > 0) ? 1 : 0;
    ctx.translate(cx, cy); ctx.scale(scX, scY);

    if (blT > 0 && sprites.item_balloon.complete) { ctx.drawImage(sprites.item_balloon, 0, 0, 80, 80, -40, -80, 80, 80); ctx.strokeStyle='#fff'; ctx.lineWidth=1.5; ctx.beginPath(); ctx.moveTo(0,-30); ctx.lineTo(0,-15); ctx.stroke(); }
    if (rocketT > 0 && sprites.item_rocket.complete) { ctx.drawImage(sprites.item_rocket, (Math.floor(Date.now() / 100)%4)*80, 0, 80, 80, -40, -55, 80, 80); if (rocketT % 2===0) spawnParticles(cx, cy+5, '#f97316', 1); }
    if (flyT > 0 && sprites.item_hat.complete) { ctx.drawImage(sprites.item_hat, (Math.floor(Date.now() / 80)%4)*80, 0, 80, 80, -40, -75, 80, 80); }
    if (djT > 0 && sprites.item_dj.complete) { ctx.drawImage(sprites.item_dj, (Math.floor(Date.now() / 150)%4)*80, 0, 80, 80, -40, -45, 80, 80); }

    if (facing === 'left') ctx.scale(-1, 1);
    ctx.drawImage(img, frameIndex * 80, 0, 80, 80, -40, -55, 80, 80);
    ctx.restore();
}

function updateLiveTopUI() {
    let allPlayers = [{ n: playerName, s: currentMeters }];
    for (let id in peers) if(peers[id].buffer.length) allPlayers.push({ n: peers[id].buffer[peers[id].buffer.length-1].n, s: peers[id].buffer[peers[id].buffer.length-1].s });
    allPlayers.sort((a,b) => b.s - a.s); let top5 = allPlayers.slice(0, 5);
    document.getElementById('liveTopName').textContent = top5[0].s === 0 ? "-" : top5[0].n; document.getElementById('liveTopScore').textContent = top5[0].s + 'm';
    document.getElementById('liveTopListRows').innerHTML = top5.map((p, i) => `<div class="lb-row"><span class="lb-rank" style="color:#d97706;font-size:.8rem;">#${i+1}</span><span class="lb-name" style="font-size:.8rem;">${escHtml(p.n)}</span><span class="lb-score" style="font-size:.8rem;">${p.s}m</span></div>`).join('');
}

function triggerJump() {
    if (gameState !== 'PLAY') return;
    if (p.isIdle && p.currentPlatform) {
        p.isIdle = false; let pl = p.currentPlatform; p.currentPlatform = null;
        p.vy = p.starCharges > 0 ? BOOST_FORCE : JUMP_FORCE; p.hasDJ = true;
        if (p.starCharges > 0) { p.starCharges--; spawnParticles(p.x, p.y, '#fbbf24', 25); floatText(p.x, p.y, 'SUPER JUMP!', '#f59e0b'); }
        if (pl && pl.type === 'fragile') { pl.broken = true; pl.isCracking = false; pl.restoreTimer = 150; spawnParticles(pl.x + pl.w/2, pl.y, '#f59e0b', 15); }
    } else if (p.djTimer > 0 && p.hasDJ && !p.isFreeFalling) { p.vy = JUMP_FORCE; p.hasDJ = false; spawnParticles(p.x, p.y + 10, '#3b82f6', 20); floatText(p.x, p.y, 'DOUBLE JUMP!', '#60a5fa'); }
}

function triggerScreenShake() { const gc = document.getElementById('gameContainer'); gc.classList.remove('shake-effect'); void gc.offsetWidth; gc.classList.add('shake-effect'); }

function loop() {
    requestAnimationFrame(loop); ctx.clearRect(0,0,W,H); if (gameState === 'MENU') return;

    let hr = Math.min(1, currentMeters / 1000); 
    document.getElementById('gameContainer').style.background = `linear-gradient(180deg, rgb(${Math.floor(224-(224-15)*hr)},${Math.floor(231-(231-23)*hr)},${Math.floor(255-(255-42)*hr)}) 0%, rgb(${Math.floor(248-(248-30)*hr)},${Math.floor(250-(250-27)*hr)},${Math.floor(252-(252-75)*hr)}) 100%)`;

    p.oldY = p.y; p.expressionTimer++; if (p.chatTimer > 0) p.chatTimer--; if (p.hurtTimer > 0) p.hurtTimer--; 
    
    const pwrCon = document.getElementById('powerBar'), pwrFill = document.getElementById('powerFill');
    if (p.rocketTimer > 0) { pwrCon.style.display='block'; pwrFill.style.width=(p.rocketTimer/80*100)+'%'; pwrFill.style.background='#ef4444'; }
    else if (p.flyTimer > 0) { pwrCon.style.display='block'; pwrFill.style.width=(p.flyTimer/150*100)+'%'; pwrFill.style.background='#60a5fa'; }
    else if (p.djTimer > 0) { pwrCon.style.display='block'; pwrFill.style.width=(p.djTimer/600*100)+'%'; pwrFill.style.background='#fde047'; }
    else if (p.balloonTimer > 0) { pwrCon.style.display='block'; pwrFill.style.width=(p.balloonTimer/400*100)+'%'; pwrFill.style.background='#f43f5e'; }
    else if (p.starCharges > 0) { pwrCon.style.display='block'; pwrFill.style.width='100%'; pwrFill.style.background='#fbbf24'; }
    else pwrCon.style.display = 'none';

    document.getElementById('heartContainer').style.display = p.hasHeart ? 'flex' : 'none';

    currentMeters = Math.max(0, Math.floor((GROUND_Y - p.y) / 50));
    if (currentMeters > highScore) { highScore = currentMeters; document.getElementById('highScoreVal').textContent = highScore + 'm'; localStorage.setItem('doodle_hs_local', highScore); }
    if (displayScore < currentMeters) displayScore = currentMeters; else if (displayScore > currentMeters) displayScore -= Math.max(1, (displayScore - currentMeters) * 0.08);
    document.getElementById('scoreVal').textContent = Math.floor(displayScore) + 'm';

    TERMINAL_V = (p.balloonTimer > 0 && p.vy > 0) ? 4 : 18; 
    if (p.rocketTimer > 0) { p.rocketTimer--; p.vy = ROCKET_FORCE; } else if (p.flyTimer > 0) { p.flyTimer--; p.vy = FLY_FORCE; } else { p.vy += GRAVITY; if (p.vy > TERMINAL_V) p.vy = TERMINAL_V; }
    if (p.djTimer > 0) p.djTimer--; if (p.balloonTimer > 0) p.balloonTimer--;

    for (let [k, pl] of platforms) if (pl.type === 'icy') { if (p.currentPlatform === pl && p.isIdle && !p.isFreeFalling) { pl.tilt += (((p.x - (pl.x + pl.w/2)) / (pl.w/2)) * 0.35 - pl.tilt) * 0.15; p.vx += Math.sin(pl.tilt) * 2.5; } else pl.tilt += (0 - pl.tilt) * 0.05; }

    if (p.isIdle) {
        if (!p.currentPlatform || p.currentPlatform.type !== 'icy') p.vx = 0; p.vy = 0; 
        if (p.currentPlatform) {
            if (p.currentPlatform.type === 'conveyor') { p.x += p.currentPlatform.dir * 2.5; p.platOffsetX = p.x - p.currentPlatform.x; }
            if (p.currentPlatform.type === 'updown') p.y = p.currentPlatform.y; 
            if ((p.currentPlatform.type === 'fragile' && p.currentPlatform.broken) || p.x < p.currentPlatform.x || p.x > p.currentPlatform.x + p.currentPlatform.w) { p.isIdle = false; p.currentPlatform = null; }
        }
        if (p.isIdle && (keys.left || keys.right)) { 
            p.isIdle = false; let pl = p.currentPlatform; p.currentPlatform = null; p.vy = p.starCharges > 0 ? BOOST_FORCE : JUMP_FORCE;
            if (p.starCharges > 0) { p.starCharges--; spawnParticles(p.x, p.y, '#fbbf24', 25); floatText(p.x, p.y, 'SUPER JUMP!', '#f59e0b'); }
            if (pl && pl.type === 'fragile') { pl.broken = true; pl.isCracking = false; pl.restoreTimer = 150; spawnParticles(pl.x + pl.w/2, pl.y, '#f59e0b', 15); }
        }
    } else {
        if (keys.left) { p.vx += (-MOVE_SPEED - p.vx) * ((p.currentPlatform && p.currentPlatform.type === 'icy') ? 0.05 : 0.3); p.facing = 'left'; }
        else if (keys.right) { p.vx += (MOVE_SPEED - p.vx) * ((p.currentPlatform && p.currentPlatform.type === 'icy') ? 0.05 : 0.3); p.facing = 'right'; }
        else p.vx *= 0.8;
    }
    p.x += p.vx; p.y += p.vy; if (p.x < -25) p.x = MAP_W+25; else if (p.x > MAP_W+25) p.x = -25;

    let targetSx = 1, targetSy = 1;
    if (p.isIdle) { p.idleBreath += 0.08; targetSx = 1 + Math.sin(p.idleBreath) * (playerType==='jelly'?0.03:0.01); targetSy = 1 - Math.sin(p.idleBreath) * (playerType==='jelly'?0.02:0.005); }
    p.scaleX += (targetSx - p.scaleX) * 0.3; p.scaleY += (targetSy - p.scaleY) * 0.3;

    if (p.y > camY + H + 50 && !p.isFreeFalling) {
        if (p.hasHeart) { p.hasHeart = false; p.vy = -45; p.y = camY + H - 10; spawnParticles(p.x, p.y, '#ef4444', 30); p.chatMsg = 'Untung!'; p.chatTimer = 100; if(chan) chan.publish('chat', {t: p.chatMsg}); floatText(p.x, p.y, 'PENYELAMATAN!', '#ef4444'); } 
        else { p.isFreeFalling = true; p.chatMsg = 'AAAAAA!!!'; p.chatTimer = 100; if (chan) chan.publish('chat',{t:'AAAAAA!!!'}); }
    }

    if (p.y >= GROUND_Y) {
        p.y = GROUND_Y;
        if (p.isFreeFalling) {
            p.vy = 0; p.vx = 0; p.isFreeFalling = false; spawnParticles(p.x, GROUND_Y, '#ef4444', 40); triggerScreenShake(); p.chatMsg = 'Aduh!'; p.chatTimer = 120; p.hurtTimer = 40; if (chan) chan.publish('chat', {t: 'Aduh!'}); lbSubmit(playerName, highScore); p.isIdle = true; p.hasDJ = true; p.currentPlatform = null;
        } else if (p.vy > 0) {
            if (!keys.left && !keys.right) { p.isIdle = true; p.currentPlatform = null; p.idleBreath = 0; p.platOffsetX = 0; p.vy = 0; p.vx = 0; p.hasDJ = true; } else { p.vy = JUMP_FORCE; p.hasDJ = true; }
            spawnParticles(p.x, p.y+5, '#e2e8f0', 5);
        }
    }

    if (p.isFreeFalling) camY += ((p.y - H/2) - camY) * 0.15; 
    else { let tCam = p.y - H*.52; if (tCam < camY) camY += (tCam-camY)*.22; else if (p.currentPlatform && p.currentPlatform.type === 'updown') { let limitCam = p.y - H*.65; if (camY < limitCam) camY += (limitCam - camY) * 0.15; } }
    if (camY > GROUND_Y - H + 20) camY = GROUND_Y - H + 20;

    let topLvl = Math.floor((GROUND_Y - camY + H) / PLAT_GAP) + 6, botLvl = Math.max(0, Math.floor((GROUND_Y - (camY+H)) / PLAT_GAP) - 3);
    for (let l=botLvl; l<=topLvl; l++) initLevel(l); for (let [k,v] of platforms) if (k>0 && (k<botLvl-8||k>topLvl+8)) { platforms.delete(k); stars.delete(k); items.delete(k); }
    updateLiveTopUI(); ctx.save(); ctx.translate(mapOffsetX, -camY);
    for (let [k,pl] of platforms) { pl.update(); pl.draw(); }

    if (!p.isFreeFalling) {
        for (let [k,s] of stars) {
            if (p.collectedLoot.has(s.id) && Date.now() - p.collectedLoot.get(s.id) < 5000) continue;
            s.update(); s.draw(); if (p.flyTimer<=0 && p.rocketTimer<=0 && Math.abs(p.x-s.x)<35 && p.y>s.y-35 && p.y<s.y+22) { p.collectedLoot.set(s.id, Date.now()); p.starCharges = 1; spawnParticles(s.x, s.y, '#fbbf24', 15); floatText(s.x, s.y, 'BINTANG AKTIF!', '#f59e0b'); }
        }
        for (let [k,it] of items) {
            if (p.collectedLoot.has(it.id) && Date.now() - p.collectedLoot.get(it.id) < 5000) continue;
            it.update(); it.draw();
            if (p.flyTimer <= 0 && p.rocketTimer <= 0 && Math.abs(p.x-it.x)<38 && p.y>it.y-38 && p.y<it.y+25) {
                p.collectedLoot.set(it.id, Date.now()); spawnParticles(it.x, it.y, '#fff', 20);
                if (it.type==='hat') { p.flyTimer=150; floatText(it.x,it.y,'TERBANG!','#60a5fa'); } if (it.type==='rocket') { p.rocketTimer=80; floatText(it.x,it.y,'ROKET!','#ef4444'); } if (it.type==='dj') { p.djTimer=600; p.hasDJ=true; floatText(it.x,it.y,'DOUBLE JUMP!','#fde047'); } if (it.type==='heart') { p.hasHeart=true; floatText(it.x,it.y,'NYAWA EXTRA!','#ef4444'); } if (it.type==='balloon') { p.balloonTimer=400; floatText(it.x,it.y,'BALON JATUH LAMBAT!','#f43f5e'); }
            }
        }
    }

    if (p.vy > 0 && p.flyTimer<=0 && p.rocketTimer<=0 && !p.isIdle && !p.isFreeFalling) {
        for (let [k,pl] of platforms) {
            if (pl.broken || !pl.isSolid || pl.y > camY + H + 10) continue; 
            let hitY = pl.type === 'icy' && pl.tilt !== 0 ? pl.y + Math.tan(pl.tilt) * (p.x - (pl.x + pl.w/2)) : pl.y;
            if (p.x+16 > pl.x && p.x-16 < pl.x+pl.w && p.oldY <= hitY+15 && p.y >= hitY-10) {
                p.y = hitY; p.hasDJ = true;
                if (pl.type==='portal') { spawnParticles(p.x, p.y, '#a855f7', 20); p.y -= 1000; camY -= 1000; p.vy = JUMP_FORCE; break; }
                if (pl.type==='bumper') { p.vy = BUMPER_FORCE; p.vx = (p.x < pl.x+pl.w/2) ? -16 : 16; spawnParticles(p.x,p.y,'#f0abfc',12); pl.bounceAnim=15; break; }
                if (pl.type==='fragile') {
                    if (!pl.isCracking) { pl.isCracking = true; pl.crackTimer = 45; } 
                    if (!keys.left && !keys.right) { p.isIdle=true; p.currentPlatform=pl; p.idleBreath=0; p.platOffsetX=p.x-pl.x; p.vy=0; } else { p.vy=JUMP_FORCE; pl.broken=true; pl.isCracking=false; pl.restoreTimer=150; spawnParticles(pl.x+pl.w/2, pl.y, '#f59e0b', 15); } break; 
                }
                if (pl.type==='spring') { p.vy=SPRING_FORCE; pl.bounceAnim=15; spawnParticles(p.x,p.y,'#fde047',8); break; }
                if (pl.type==='trampoline') { p.vy=TRAMPOLINE_FORCE; pl.bounceAnim=15; spawnParticles(p.x,p.y,'#fca5a5',10); break; }
                if (!keys.left && !keys.right) { p.isIdle=true; p.currentPlatform=pl; p.idleBreath=0; p.platOffsetX = p.x - pl.x; } else { p.vy=JUMP_FORCE; p.currentPlatform=pl; } break;
            }
        }
    }

    if (p.isIdle && p.currentPlatform && p.currentPlatform.type === 'moving') p.x = p.currentPlatform.x + p.platOffsetX; 
    for (let i=particles.length-1;i>=0;i--) {
        let pt=particles[i]; pt.x+=pt.vx; pt.y+=pt.vy; pt.life-=.04;
        if (pt.life<=0) { particles.splice(i,1); continue; }
        ctx.globalAlpha=pt.life; ctx.fillStyle=ctx.strokeStyle=pt.c; ctx.lineWidth=2; ctx.beginPath();
        if (pt.type==='circle') ctx.arc(pt.x,pt.y,pt.s,0,Math.PI*2); else { ctx.moveTo(pt.x,pt.y); ctx.lineTo(pt.x+pt.vx*2,pt.y+pt.vy*2); ctx.stroke(); }
        ctx.fill(); ctx.globalAlpha=1;
    }

    let renderTime = Date.now() - 80;
    for (let id in peers) {
        let op = peers[id]; if (op.chatTimer > 0) op.chatTimer--;
        if (!op.buffer || op.buffer.length === 0) continue;
        let s0 = null, s1 = null, targetX, targetY, targetSx, targetSy, refState = op.buffer[op.buffer.length - 1]; 
        for (let i = 0; i < op.buffer.length - 1; i++) { if (op.buffer[i].t <= renderTime && op.buffer[i+1].t >= renderTime) { s0 = op.buffer[i]; s1 = op.buffer[i+1]; break; } }
        if (s0 && s1) { let r = (renderTime - s0.t) / (s1.t - s0.t); targetX = s0.x + (s1.x - s0.x) * r; targetY = s0.y + (s1.y - s0.y) * r; targetSx = s0.sx + (s1.sx - s0.sx) * r; targetSy = s0.sy + (s1.sy - s0.sy) * r; refState = s0; } 
        else { if (op.x === undefined) { op.x = refState.x; op.y = refState.y; } targetX = refState.x; targetY = refState.y; targetSx = refState.sx; targetSy = refState.sy; }
        op.x += (targetX - op.x) * 0.3; op.y += (targetY - op.y) * 0.3;
        drawCharacter(op.x, op.y, targetSx||1, targetSy||1, refState.n, refState.f||'right', refState.fly?30:0, refState.rocket?30:0, refState.dj?30:0, refState.bl?30:0, op.chatMsg||'', op.chatTimer||0, refState.fl, refState.ct||'doodle', refState.ht, refState.vy||0);
    }
    
    drawCharacter(p.x, p.y, p.scaleX, p.scaleY, playerName, p.facing, p.flyTimer, p.rocketTimer, p.djTimer, p.balloonTimer, p.chatMsg, p.chatTimer, p.isFreeFalling || p.vy > 8, playerType, p.hurtTimer > 0, p.vy);
    ctx.restore(); 
}

// ── UI INTERACTIONS & INPUT ──
document.getElementById('lbToggle').onclick = () => { document.getElementById('lbContent').classList.toggle('open'); };
document.getElementById('liveTopBtn').onclick = () => { document.getElementById('liveTopContent').classList.toggle('open'); };
document.querySelectorAll('.char-sel').forEach(btn => { btn.onclick = () => { document.querySelectorAll('.char-sel').forEach(b=>b.classList.remove('selected')); btn.classList.add('selected'); playerType = btn.dataset.t; }; });

document.getElementById('startBtn').onclick = () => {
    let name = document.getElementById('nameInput').value.trim(); const err = document.getElementById('errMsg');
    if (!name) { err.textContent = 'Masukkan nama dulu!'; return; } if (name.length < 2) { err.textContent = 'Minimal 2 huruf!'; return; }
    playerName = name; localStorage.setItem('doodle_n12', playerName); localStorage.setItem('doodle_t12', playerType);
    document.getElementById('overlay').style.display = 'none'; document.getElementById('scoreHud').style.display = 'flex'; document.getElementById('onlinePill').style.display = 'flex'; document.getElementById('chatFab').style.display = 'block'; document.getElementById('touchZone').style.display = 'block';
    connectAbly(name); resetGame(); lbLocalLoad(); renderLB();
};

let savedName = localStorage.getItem('doodle_n12'), savedType = localStorage.getItem('doodle_t12');
if (savedName) document.getElementById('nameInput').value = savedName;
if (savedType) { playerType = savedType; document.querySelectorAll('.char-sel').forEach(btn => { btn.classList.remove('selected'); if (btn.dataset.t === savedType) btn.classList.add('selected'); }); }

document.getElementById('tzL').addEventListener('touchstart',e=>{if(gameState==='PLAY'){e.preventDefault();keys.left=true;p.facing='left';}},{passive:false});
document.getElementById('tzL').addEventListener('touchend',  e=>{if(gameState==='PLAY'){e.preventDefault();keys.left=false;}},{passive:false});
document.getElementById('tzR').addEventListener('touchstart',e=>{if(gameState==='PLAY'){e.preventDefault();keys.right=true;p.facing='right';}},{passive:false});
document.getElementById('tzR').addEventListener('touchend',  e=>{if(gameState==='PLAY'){e.preventDefault();keys.right=false;}},{passive:false});
document.getElementById('tzL').addEventListener('mousedown',()=>{keys.left=true;p.facing='left';}); document.getElementById('tzL').addEventListener('mouseup',()=>{keys.left=false;});
document.getElementById('tzR').addEventListener('mousedown',()=>{keys.right=true;p.facing='right';}); document.getElementById('tzR').addEventListener('mouseup',()=>{keys.right=false;});
document.getElementById('tzJ').addEventListener('touchstart', e => { e.preventDefault(); triggerJump(); }, {passive:false});
document.getElementById('tzJ').addEventListener('mousedown', e => { e.preventDefault(); triggerJump(); });

window.addEventListener('keydown', e => { let ci = document.getElementById('chatTxt'); if (document.activeElement === ci) return; if (e.key==='ArrowLeft'||e.key==='a') { keys.left=true; p.facing='left'; } if (e.key==='ArrowRight'||e.key==='d') { keys.right=true; p.facing='right'; } if (e.key===' ' || e.key==='ArrowUp' || e.key==='w') triggerJump(); });
window.addEventListener('keyup', e => { if (e.key==='ArrowLeft'||e.key==='a') keys.left=false; if (e.key==='ArrowRight'||e.key==='d') keys.right=false; });

const chatFabBtn = document.getElementById('chatFabBtn'), chatPopup = document.getElementById('chatPopup');
chatFabBtn.onclick = () => chatPopup.classList.toggle('open');
document.querySelectorAll('.qc-btn').forEach(btn => { btn.onclick = () => { sendChat(btn.textContent); chatPopup.classList.remove('open'); }; });
document.getElementById('chatSend').onclick = () => { let v = document.getElementById('chatTxt').value.trim(); if (v) { sendChat(v); document.getElementById('chatTxt').value=''; chatPopup.classList.remove('open'); } };
document.getElementById('chatTxt').addEventListener('keypress', e => { if (e.key==='Enter') { let v = e.target.value.trim(); if (v) { sendChat(v); e.target.value=''; chatPopup.classList.remove('open'); } } });
document.addEventListener('click', e => { if (!document.getElementById('chatFab').contains(e.target)) chatPopup.classList.remove('open'); });

lbLocalLoad(); renderLB(); loop();
</script>
